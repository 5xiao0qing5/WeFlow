name: Sync Upstream Main

on:
  schedule:
    # GitHub Actions 使用 UTC；这里对应北京时间每天凌晨 4 点
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main from upstream
        env:
          UPSTREAM_REPO: https://github.com/hicccc77/WeFlow.git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "$UPSTREAM_REPO"
          else
            git remote add upstream "$UPSTREAM_REPO"
          fi

          git fetch origin main:refs/remotes/origin/main
          git fetch upstream main:refs/remotes/upstream/main

          if git merge-base --is-ancestor origin/main upstream/main; then
            git push origin upstream/main:main
          else
            echo "origin/main contains commits that are not in upstream/main; skipping automatic sync."
            exit 1
          fi
