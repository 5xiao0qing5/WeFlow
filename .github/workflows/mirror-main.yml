name: Mirror Upstream Main

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mirror-upstream-main
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Mirror upstream main to fork main
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream https://github.com/hicccc77/WeFlow.git
          else
            git remote add upstream https://github.com/hicccc77/WeFlow.git
          fi

          git fetch upstream main

          git remote set-url origin https://x-access-token:${MIRROR_PAT}@github.com/5xiao0qing5/WeFlow.git
          git push origin refs/remotes/upstream/main:refs/heads/main --force
